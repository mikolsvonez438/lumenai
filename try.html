<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumenaris AI | Humanize & Rewrite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(148, 163, 184, 0.1);
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
            animation: bgPulse 15s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 10px 40px -10px rgba(99, 102, 241, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--primary-hover) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.125rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 968px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .panel:hover {
            transform: translateY(-2px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .panel-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .input-icon { background: rgba(99, 102, 241, 0.2); color: var(--primary-hover); }
        .output-icon { background: rgba(16, 185, 129, 0.2); color: var(--success); }

        .textarea-wrapper {
            position: relative;
        }

        textarea {
            width: 100%;
            min-height: 300px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            transition: all 0.3s ease;
            line-height: 1.7;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        textarea::placeholder {
            color: var(--text-secondary);
        }

        .char-count {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
            background: rgba(15, 23, 42, 0.9);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            pointer-events: none;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select, .toggle-btn {
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 180px;
        }

        select:hover, .toggle-btn:hover {
            border-color: var(--primary);
        }

        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .toggle-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
        }

        .toggle-btn.active {
            background: var(--primary);
            color: white;
        }

        .toggle-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .toggle-btn.active .toggle-indicator {
            background: white;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .action-bar {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.5);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.6);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(30, 41, 59, 0.8);
            color: var(--text-primary);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(30, 41, 59, 1);
            border-color: var(--primary);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .output-area {
            position: relative;
        }

        .output-text {
            min-height: 300px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.7;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 400px;
        }

        .output-text:empty::before {
            content: 'Humanized text will appear here...';
            color: var(--text-secondary);
            font-style: italic;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            z-index: 10;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(99, 102, 241, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateX(400px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
        }

        .toast-success { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .toast-error { background: rgba(239, 68, 68, 0.2); color: var(--error); }

        .stats {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 1rem 1.5rem;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 16px;
            border: 1px solid var(--border);
            min-width: 120px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-hover);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .diff-highlight {
            background: rgba(16, 185, 129, 0.2);
            border-radius: 4px;
            padding: 0 4px;
            transition: all 0.3s ease;
        }

        .diff-highlight:hover {
            background: rgba(16, 185, 129, 0.3);
        }

        @media (max-width: 640px) {
            h1 { font-size: 1.75rem; }
            .panel { padding: 1.25rem; }
            textarea { min-height: 200px; }
            .controls { flex-direction: column; align-items: stretch; }
            select, .toggle-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">✨</div>
                <h1>Lumenaris AI</h1>
            </div>
            <p class="subtitle">Advanced text humanization and rewriting powered by neural networks. Transform robotic text into natural, engaging content.</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <label class="control-label">Model</label>
                <select id="modelSelect">
                    <option value="LUMENARIS" selected>Lumenaris (Recommended)</option>
                    <option value="GPT-4">GPT-4</option>
                    <option value="CLAUDE">Claude 3</option>
                </select>
            </div>
            
            <div class="control-group">
                <label class="control-label">Mode</label>
                <button class="toggle-btn active" id="humanizeToggle" onclick="toggleHumanize()">
                    <span>Humanize</span>
                    <span class="toggle-indicator"></span>
                </button>
            </div>

            <div class="control-group">
                <label class="control-label">Style</label>
                <select id="styleSelect">
                    <option value="Natural">Natural & Conversational</option>
                    <option value="Academic">Academic & Formal</option>
                    <option value="Creative">Creative & Vivid</option>
                    <option value="Professional">Professional & Concise</option>
                </select>
            </div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <div class="panel-icon input-icon">📝</div>
                        Input Text
                    </div>
                    <button class="btn btn-secondary" onclick="clearInput()" style="padding: 0.5rem 1rem; font-size: 0.875rem;">
                        Clear
                    </button>
                </div>
                <div class="textarea-wrapper">
                    <textarea id="inputText" placeholder="Paste your text here to humanize...&#10;&#10;Example: Effective waste management practices encompass a range of strategies aimed at minimizing the generation, disposal, and environmental impact of waste materials..."></textarea>
                    <div class="char-count" id="inputCount">0 chars</div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <div class="panel-icon output-icon">✨</div>
                        Humanized Result
                    </div>
                    <button class="btn btn-secondary" onclick="copyOutput()" style="padding: 0.5rem 1rem; font-size: 0.875rem;">
                        Copy
                    </button>
                </div>
                <div class="output-area">
                    <div class="loading-overlay" id="loadingOverlay">
                        <div class="spinner"></div>
                        <div class="loading-text">Neural processing in progress...</div>
                    </div>
                    <div class="output-text" id="outputText"></div>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn btn-primary" id="humanizeBtn" onclick="humanizeText()">
                <span>🚀</span>
                <span>Humanize Text</span>
            </button>
            <button class="btn btn-secondary" onclick="swapText()">
                <span>🔄</span>
                <span>Use as Input</span>
            </button>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat-item">
                <div class="stat-value" id="wordCount">0</div>
                <div class="stat-label">Words</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="readability">0%</div>
                <div class="stat-label">Readability</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="humanScore">0%</div>
                <div class="stat-label">Human Score</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <div class="toast-icon" id="toastIcon">✓</div>
        <div id="toastMessage">Operation successful</div>
    </div>

    <script>
        const API_URL = 'https://rewriterpro-backend.azurewebsites.net/api/getResponseToAPrompt';
        
        let isHumanizeEnabled = true;

        // Character counter
        document.getElementById('inputText').addEventListener('input', function() {
            document.getElementById('inputCount').textContent = `${this.value.length} chars`;
        });

        function toggleHumanize() {
            isHumanizeEnabled = !isHumanizeEnabled;
            const btn = document.getElementById('humanizeToggle');
            btn.classList.toggle('active');
            btn.querySelector('span:first-child').textContent = isHumanizeEnabled ? 'Humanize' : 'Standard';
        }

        function clearInput() {
            document.getElementById('inputText').value = '';
            document.getElementById('inputCount').textContent = '0 chars';
            document.getElementById('inputText').focus();
        }

        function copyOutput() {
            const output = document.getElementById('outputText').textContent;
            if (!output) return;
            
            navigator.clipboard.writeText(output).then(() => {
                showToast('Copied to clipboard!', 'success');
            });
        }

        function swapText() {
            const output = document.getElementById('outputText').textContent;
            if (!output) return;
            
            document.getElementById('inputText').value = output;
            document.getElementById('inputCount').textContent = `${output.length} chars`;
            document.getElementById('outputText').textContent = '';
            document.getElementById('stats').style.display = 'none';
            showToast('Output moved to input', 'success');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');
            
            icon.className = 'toast-icon toast-' + type;
            icon.textContent = type === 'success' ? '✓' : '✕';
            msg.textContent = message;
            
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function humanizeText() {
            const input = document.getElementById('inputText').value.trim();
            const btn = document.getElementById('humanizeBtn');
            const loading = document.getElementById('loadingOverlay');
            const output = document.getElementById('outputText');
            
            if (!input) {
                showToast('Please enter some text first', 'error');
                return;
            }

            // UI State
            btn.disabled = true;
            loading.classList.add('active');
            output.textContent = '';
            
            const payload = {
                prompt: input,
                promptOptions: {
                    style: document.getElementById('styleSelect').value,
                    tone: isHumanizeEnabled ? 'human' : 'neutral'
                },
                isHumanizeEnabled: isHumanizeEnabled,
                rephraseType: isHumanizeEnabled ? "Humanizer" : "Standard",
                selectedModel: document.getElementById('modelSelect').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Accept': '*/*',
                        'Accept-Language': 'en-US,en;q=0.5',
                        'Connection': 'keep-alive',
                        'Content-Type': 'application/json',
                        'Origin': 'https://rewriterpro.ai',
                        'Sec-Fetch-Dest': 'empty',
                        'Sec-Fetch-Mode': 'cors',
                        'Sec-Fetch-Site': 'cross-site',
                        'Sec-GPC': '1',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/145.0.0.0 Safari/537.36',
                        'sec-ch-ua': '"Not:A-Brand";v="99", "Brave";v="145", "Chromium";v="145"',
                        'sec-ch-ua-mobile': '?0',
                        'sec-ch-ua-platform': '"Windows"'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                // Simulate typing effect
                const result = data.response || data.result || JSON.stringify(data);
                typeWriter(result, output);
                
                // Update stats
                updateStats(result);
                document.getElementById('stats').style.display = 'flex';
                
                showToast('Text humanized successfully!', 'success');
                
            } catch (error) {
                console.error('Error:', error);
                showToast('Error: ' + error.message, 'error');
                output.textContent = 'Error processing request. Please try again.';
            } finally {
                btn.disabled = false;
                loading.classList.remove('active');
            }
        }

        function typeWriter(text, element) {
            element.textContent = '';
            let i = 0;
            const speed = 10; // ms per char
            
            function type() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                    element.scrollTop = element.scrollHeight;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        function updateStats(text) {
            const words = text.trim().split(/\s+/).length;
            const sentences = text.split(/[.!?]+/).filter(s => s.trim()).length;
            const avgWordsPerSentence = sentences > 0 ? (words / sentences).toFixed(1) : 0;
            
            // Simulated metrics based on text analysis
            const readability = Math.min(100, Math.max(60, 100 - (avgWordsPerSentence * 2))).toFixed(0);
            const humanScore = isHumanizeEnabled ? (85 + Math.random() * 10).toFixed(0) : (45 + Math.random() * 20).toFixed(0);
            
            document.getElementById('wordCount').textContent = words;
            document.getElementById('readability').textContent = readability + '%';
            document.getElementById('humanScore').textContent = humanScore + '%';
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                humanizeText();
            }
        });
    </script>
</body>
</html>
